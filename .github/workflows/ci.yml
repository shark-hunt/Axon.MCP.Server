name: CI

on:
  push:
    branches: [ public-release ]
  pull_request:
    branches: [ public-release ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: password
          POSTGRES_DB: axon_mcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests
      env:
        TEST_DATABASE_URL: postgresql+asyncpg://axon:password@localhost:5432/axon_mcp_test
        DATABASE_URL: postgresql+asyncpg://axon:password@localhost:5432/axon_mcp_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
        # Minimal required env vars to prevent Settings validation errors
        GITLAB_TOKEN: test-gitlab-token
        JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-characters-long
        API_SECRET_KEY: test-api-secret-key
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing
